<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Weather Up! — Hector's Deli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0A0A0A;
  --bg2:    #111111;
  --bg3:    #1A1A1A;
  --bg4:    #222222;
  --red:    #D70F00;
  --red2:   #FF1A08;
  --line:   rgba(255,255,255,0.07);
  --line2:  rgba(255,255,255,0.12);
  --tx1:    #FFFFFF;
  --tx2:    rgba(255,255,255,0.65);
  --tx3:    rgba(255,255,255,0.35);
  --tx4:    rgba(255,255,255,0.18);
  --gn:     #1DB954;
  --amber:  #F5A623;
  --blue:   #4A9EE0;
  --gn-dim: rgba(29,185,84,0.15);
  --amb-dim:rgba(245,166,35,0.15);
  --blu-dim:rgba(74,158,224,0.15);
  --red-dim:rgba(215,15,0,0.15);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { font-size:14px; -webkit-text-size-adjust:100%; background:var(--bg) }
body { background:var(--bg); color:var(--tx1); font-family:'Barlow Condensed',sans-serif; min-height:100vh; overflow-x:hidden }

/* ── SCANLINE TEXTURE ── */
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
}

/* ── TOPBAR ── */
.topbar {
  position:sticky; top:0; z-index:200;
  background:var(--bg); border-bottom:1px solid var(--line2);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; height:48px; gap:12px;
}
.brand { display:flex; align-items:center; gap:8px; flex-shrink:0 }
.brand-logo {
  width:26px; height:26px; background:var(--red); border-radius:3px;
  display:flex; align-items:center; justify-content:center;
  font-family:'DM Serif Display',serif; color:#fff; font-size:13px; font-style:italic;
}
.brand-name {
  font-family:'DM Serif Display',serif; font-style:italic;
  font-size:18px; color:var(--tx1); letter-spacing:-.3px; white-space:nowrap;
}
.brand-name em { color:var(--red); font-style:normal }
.topbar-right { display:flex; align-items:center; gap:8px; flex-shrink:0 }
.status-pill {
  display:flex; align-items:center; gap:5px;
  border:1px solid var(--line2); border-radius:3px;
  padding:3px 8px; font-size:10px; font-weight:600;
  letter-spacing:.08em; text-transform:uppercase; color:var(--tx3);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px;
}
.pulse { width:5px; height:5px; border-radius:50%; background:var(--gn); flex-shrink:0; animation:blink 2s infinite }
.pulse.stale { background:var(--amber) }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.btn-refresh {
  background:transparent; border:1px solid var(--line2); color:var(--tx3);
  width:28px; height:28px; border-radius:3px; cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center; transition:all .15s;
  flex-shrink:0;
}
.btn-refresh:hover { border-color:var(--red); color:var(--red) }

/* ── LOCATION ROW ── */
.loc-row {
  display:grid; grid-template-columns:repeat(4,1fr);
  border-bottom:1px solid var(--line2); background:var(--bg);
  position:sticky; top:48px; z-index:190;
}
.loc-card {
  padding:10px 14px; border-right:1px solid var(--line);
  cursor:pointer; transition:background .15s; position:relative; overflow:hidden;
}
.loc-card:last-child { border-right:none }
.loc-card:hover { background:var(--bg3) }
.loc-card.active { background:var(--bg3) }
.loc-card.active::after {
  content:''; position:absolute; bottom:0; left:0; right:0;
  height:2px; background:var(--red);
}
.loc-id {
  font-size:9px; font-weight:800; letter-spacing:.12em;
  text-transform:uppercase; color:var(--tx3); margin-bottom:4px;
}
.loc-card.active .loc-id { color:var(--red) }
.loc-temp-row { display:flex; align-items:baseline; gap:4px }
.loc-temp {
  font-size:22px; font-weight:700; color:var(--tx1); line-height:1;
  font-family:'Barlow Condensed',sans-serif;
}
.loc-icon { font-size:16px; line-height:1 }
.loc-cond { font-size:10px; color:var(--tx3); margin-top:2px; letter-spacing:.02em }

/* ── DAY NAV ── */
.day-nav {
  display:flex; overflow-x:auto; -webkit-overflow-scrolling:touch;
  border-bottom:1px solid var(--line); background:var(--bg2);
  scrollbar-width:none;
}
.day-nav::-webkit-scrollbar { display:none }
.day-btn {
  flex-shrink:0; padding:8px 16px; cursor:pointer;
  border-right:1px solid var(--line); transition:background .15s;
  display:flex; flex-direction:column; align-items:center; gap:2px;
}
.day-btn:hover { background:var(--bg3) }
.day-btn.active { background:var(--bg3); position:relative }
.day-btn.active::after {
  content:''; position:absolute; bottom:0; left:0; right:0;
  height:2px; background:var(--red);
}
.day-btn-name { font-size:10px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--tx3) }
.day-btn.active .day-btn-name { color:var(--tx1) }
.day-btn-date { font-size:9px; color:var(--tx4) }
.day-btn-icon { font-size:18px; line-height:1.1 }
.day-btn-range { font-size:10px; color:var(--tx3) }
.day-btn.active .day-btn-range { color:var(--tx2) }

/* ── VIEW TOGGLE ── */
.view-toggle {
  display:flex; border-bottom:1px solid var(--line);
  background:var(--bg2);
}
.view-btn {
  padding:8px 18px; font-size:10px; font-weight:800;
  letter-spacing:.1em; text-transform:uppercase; color:var(--tx3);
  cursor:pointer; border-right:1px solid var(--line); transition:all .15s;
  position:relative;
}
.view-btn:hover { color:var(--tx2) }
.view-btn.active { color:var(--tx1) }
.view-btn.active::after {
  content:''; position:absolute; bottom:0; left:0; right:0;
  height:2px; background:var(--red);
}

/* ── MAIN ── */
.main { padding:14px; max-width:1400px; margin:0 auto; position:relative; z-index:1 }

/* ── OPS ALERT ── */
.ops-alert {
  border:1px solid var(--line2); border-radius:3px;
  padding:10px 14px; margin-bottom:12px;
  display:flex; align-items:flex-start; gap:10px;
  font-size:12px; line-height:1.5; color:var(--tx2);
  background:var(--bg2);
}
.ops-alert.warn { border-color:rgba(215,15,0,.4); background:rgba(215,15,0,.06) }
.ops-alert.mild { border-color:rgba(245,166,35,.3); background:rgba(245,166,35,.05) }
.ops-alert.clear { border-color:rgba(29,185,84,.3); background:rgba(29,185,84,.05) }
.ops-alert-icon { font-size:16px; flex-shrink:0; margin-top:1px }
.ops-alert-label {
  font-size:9px; font-weight:800; letter-spacing:.12em;
  text-transform:uppercase; color:var(--tx3); margin-bottom:3px;
}

/* ── HERO STRIP ── */
.hero-strip {
  display:grid; grid-template-columns:1fr auto;
  border:1px solid var(--line2); border-radius:3px;
  background:var(--bg2); margin-bottom:12px; overflow:hidden;
}
.hero-main { padding:18px 20px; border-right:1px solid var(--line) }
.hero-suburb {
  font-family:'DM Serif Display',serif; font-style:italic;
  font-size:32px; color:var(--tx1); letter-spacing:-.5px; line-height:1;
  margin-bottom:2px;
}
.hero-sub { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--tx3); margin-bottom:14px }
.hero-temp-row { display:flex; align-items:flex-end; gap:12px }
.hero-temp {
  font-size:72px; font-weight:800; line-height:1; color:var(--tx1);
  letter-spacing:-3px;
}
.hero-temp sup { font-size:28px; letter-spacing:0; vertical-align:top; margin-top:10px; font-weight:600 }
.hero-right-panel { padding:14px 16px; display:flex; flex-direction:column; justify-content:space-between; min-width:120px }
.hero-icon-big { font-size:48px; line-height:1; text-align:center; margin-bottom:8px }
.hero-feels { font-size:11px; color:var(--tx3); margin-bottom:2px }
.hero-range { font-size:16px; font-weight:700; color:var(--tx2) }
.hero-cond { font-size:11px; color:var(--tx3); margin-top:4px }

/* ── STAT GRID ── */
.stat-grid {
  display:grid; grid-template-columns:repeat(6,1fr);
  border:1px solid var(--line2); border-radius:3px;
  background:var(--bg2); margin-bottom:12px; overflow:hidden;
}
.stat-cell {
  padding:12px 14px; border-right:1px solid var(--line);
}
.stat-cell:last-child { border-right:none }
.stat-lbl { font-size:9px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--tx3); margin-bottom:6px }
.stat-val { font-size:24px; font-weight:700; color:var(--tx1); line-height:1 }
.stat-unit { font-size:11px; font-weight:400; color:var(--tx3) }
.stat-sub { font-size:10px; color:var(--tx3); margin-top:4px }

/* ── HOURLY ── */
.section-head {
  font-size:9px; font-weight:800; letter-spacing:.14em; text-transform:uppercase;
  color:var(--tx3); padding:0 0 8px; border-bottom:1px solid var(--line);
  margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;
}
.section-head span { color:var(--tx4); font-weight:600; letter-spacing:.06em }
.panel { border:1px solid var(--line2); border-radius:3px; background:var(--bg2); margin-bottom:12px; overflow:hidden }
.panel-hd { padding:10px 14px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center }
.panel-title { font-size:9px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--tx3) }
.panel-sub { font-size:10px; color:var(--tx4) }

.h-scroll { display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding:10px 12px; scrollbar-width:none }
.h-scroll::-webkit-scrollbar { display:none }
.hb {
  flex-shrink:0; min-width:62px; background:var(--bg3); border:1px solid var(--line);
  border-radius:3px; padding:8px 8px 6px; text-align:center;
  display:flex; flex-direction:column; gap:3px;
}
.hb.now { background:var(--red-dim); border-color:var(--red) }
.hb-t { font-size:9px; font-weight:800; letter-spacing:.08em; color:var(--tx3) }
.hb.now .hb-t { color:var(--red) }
.hb-i { font-size:18px; line-height:1.2 }
.hb-d { font-size:16px; font-weight:700; color:var(--tx1) }
.hb.now .hb-d { color:var(--tx1) }
.hb-r { font-size:9px; font-weight:700 }
.hb-r.dry  { color:var(--gn) }
.hb-r.maybe{ color:var(--amber) }
.hb-r.wet  { color:var(--blue) }
.hb-g { font-size:9px; color:var(--tx4) }

/* ── RAIN BARS ── */
.rain-rows { padding:10px 14px; display:flex; flex-direction:column; gap:6px }
.rr { display:flex; align-items:center; gap:8px }
.rr-t { font-size:10px; font-weight:600; color:var(--tx3); width:38px; flex-shrink:0; text-align:right }
.rr-wrap { flex:1; height:12px; background:var(--bg3); border-radius:2px; overflow:hidden }
.rr-bar { height:100%; border-radius:2px }
.rr-pct { font-size:10px; font-weight:700; width:28px; flex-shrink:0 }

/* ── WIND ── */
.wind-grid { display:grid; grid-template-columns:80px 1fr }
.compass-wrap { padding:16px; display:flex; flex-direction:column; align-items:center; gap:6px; border-right:1px solid var(--line) }
.compass-lbl { font-size:10px; font-weight:700; color:var(--tx3) }
.wind-stats { padding:14px 16px; display:flex; flex-direction:column; gap:10px; justify-content:center }
.ws-row { display:flex; justify-content:space-between; align-items:baseline }
.ws-lbl { font-size:9px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--tx4) }
.ws-val { font-size:18px; font-weight:700; color:var(--tx1) }
.ws-unit { font-size:10px; color:var(--tx3) }

/* ── 7-DAY ── */
.fc-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:0 }
.fc-day {
  padding:12px 10px; border-right:1px solid var(--line);
  display:flex; flex-direction:column; align-items:center; gap:5px;
  cursor:pointer; transition:background .15s;
}
.fc-day:last-child { border-right:none }
.fc-day:hover { background:var(--bg3) }
.fc-day.active { background:var(--bg3); position:relative }
.fc-day.active::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--red) }
.fc-name { font-size:9px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--tx3) }
.fc-day.active .fc-name { color:var(--red) }
.fc-icon { font-size:22px; line-height:1.1 }
.fc-hi { font-size:18px; font-weight:700; color:var(--tx1) }
.fc-lo { font-size:12px; color:var(--tx3) }
.fc-rp { font-size:10px; font-weight:700 }
.fc-mm { font-size:9px; color:var(--tx4) }
.fc-sr { font-size:9px; color:var(--amber) }

/* ── HISTORY ── */
.hist-controls { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; align-items:center }
.hist-lbl { font-size:9px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--tx3) }
.hist-sel {
  font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:600;
  padding:5px 10px; background:var(--bg3); border:1px solid var(--line2);
  color:var(--tx1); border-radius:3px; cursor:pointer;
}
.hist-sel:focus { outline:none; border-color:var(--red) }
.hist-stats { display:grid; grid-template-columns:repeat(4,1fr); border:1px solid var(--line2); border-radius:3px; overflow:hidden; margin-bottom:12px }
.hist-stat { padding:12px 14px; border-right:1px solid var(--line); background:var(--bg2) }
.hist-stat:last-child { border-right:none }
.no-data { padding:40px; text-align:center; color:var(--tx3); font-size:12px; letter-spacing:.06em }

/* ── DAILY RANGE STRIP ── */
.range-strip { display:flex; gap:6px; overflow-x:auto; padding:10px 14px; scrollbar-width:none }
.range-strip::-webkit-scrollbar { display:none }
.range-card {
  flex-shrink:0; background:var(--bg3); border:1px solid var(--line);
  border-radius:3px; padding:8px 10px; text-align:center; min-width:52px;
}
.rc-day { font-size:9px; color:var(--tx4) }
.rc-hi { font-size:15px; font-weight:700; color:var(--red) }
.rc-lo { font-size:12px; color:var(--blue) }

/* ── LOADING / ERROR ── */
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; gap:12px }
.spinner { width:32px; height:32px; border:2px solid var(--line2); border-top-color:var(--red); border-radius:50%; animation:spin .7s linear infinite }
@keyframes spin { to { transform:rotate(360deg) } }
.load-txt { font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--tx3) }
.err { padding:40px; text-align:center; color:var(--red); font-size:11px; letter-spacing:.06em }

/* ── UV BADGE ── */
.uv-badge { display:inline-block; border-radius:2px; padding:2px 7px; font-size:12px; font-weight:700; letter-spacing:.04em }

/* ── ANIMATIONS ── */
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.fade { animation:fadeIn .22s ease forwards; opacity:0 }

/* ── SVG CHART ── */
.chart-wrap { padding:12px 14px; overflow-x:auto }

/* ── RESPONSIVE ── */
@media(max-width:900px) {
  .stat-grid { grid-template-columns:repeat(3,1fr) }
  .stat-cell:nth-child(3) { border-right:none }
  .stat-cell:nth-child(4) { border-top:1px solid var(--line) }
  .stat-cell:nth-child(5) { border-top:1px solid var(--line) }
  .stat-cell:nth-child(6) { border-top:1px solid var(--line); border-right:none }
  .fc-grid { grid-template-columns:repeat(4,1fr) }
}
@media(max-width:600px) {
  /* loc row — 2x2 grid on mobile */
  .loc-row { grid-template-columns:repeat(2,1fr) }
  .loc-card:nth-child(2) { border-right:none }
  .loc-card:nth-child(3) { border-top:1px solid var(--line); border-right:1px solid var(--line) }
  .loc-card:nth-child(4) { border-top:1px solid var(--line); border-right:none }
  /* hero */
  .hero-strip { grid-template-columns:1fr }
  .hero-main { border-right:none; border-bottom:1px solid var(--line); padding:14px 16px }
  .hero-suburb { font-size:26px }
  .hero-temp { font-size:56px }
  .hero-right-panel { flex-direction:row; align-items:center; padding:10px 14px; min-width:unset }
  .hero-icon-big { font-size:36px; margin-bottom:0; margin-right:12px }
  /* stats */
  .stat-grid { grid-template-columns:repeat(2,1fr) }
  .stat-cell { border-top:1px solid var(--line) }
  .stat-cell:nth-child(1),.stat-cell:nth-child(2) { border-top:none }
  .stat-cell:nth-child(2),.stat-cell:nth-child(4),.stat-cell:nth-child(6) { border-right:none }
  .stat-cell:nth-child(3),.stat-cell:nth-child(4),.stat-cell:nth-child(5),.stat-cell:nth-child(6) { border-top:1px solid var(--line) }
  /* forecast */
  .fc-grid { grid-template-columns:repeat(4,1fr) }
  /* wind */
  .wind-grid { grid-template-columns:1fr }
  .compass-wrap { border-right:none; border-bottom:1px solid var(--line); padding:12px }
  /* spacing */
  .main { padding:10px }
  .hist-stats { grid-template-columns:repeat(2,1fr) }
  .hist-stat:nth-child(2) { border-right:none }
  .hist-stat:nth-child(3),.hist-stat:nth-child(4) { border-top:1px solid var(--line) }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <div class="brand-logo">W</div>
    <div class="brand-name">Weather Up<em>!</em></div>
  </div>
  <div class="topbar-right">
    <div class="status-pill" id="statusPill">
      <span class="pulse" id="pulseDot"></span>
      <span id="fetchedAt">Loading…</span>
    </div>
    <button class="btn-refresh" onclick="loadData()" title="Refresh">↻</button>
  </div>
</div>

<!-- LOCATION ROW -->
<div class="loc-row" id="locRow"></div>

<!-- DAY NAV -->
<div class="day-nav" id="dayNav"></div>

<!-- VIEW TOGGLE -->
<div class="view-toggle">
  <div class="view-btn active" id="vbForecast" onclick="switchView('forecast',this)">Forecast</div>
  <div class="view-btn" id="vbHistory" onclick="switchView('history',this)">History</div>
</div>

<!-- MAIN -->
<div class="main" id="main">
  <div class="loading"><div class="spinner"></div><div class="load-txt">Loading weather data…</div></div>
</div>

<script>
// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const S = {
  latest:      null,
  history:     null,
  loc:         0,       // 0-3
  day:         0,       // 0-6
  view:        'forecast',
  histDays:    30,
  histMetric:  'temp',
};

const LOCS = [
  { id:'south-melbourne', suburb:'South Melbourne', short:'STH MELB', outlets:2 },
  { id:'fitzroy',         suburb:'Fitzroy',         short:'FITZROY',  outlets:2 },
  { id:'richmond',        suburb:'Richmond',        short:'RICHMOND', outlets:2 },
  { id:'cbd',             suburb:'Melbourne CBD',   short:'CBD',      outlets:1 },
];

// ═══════════════════════════════════════════
// LOAD
// ═══════════════════════════════════════════
async function loadData() {
  try {
    const [lr, hr] = await Promise.all([
      fetch('weather_latest.json?_=' + Date.now()),
      fetch('weather_history.json?_=' + Date.now()),
    ]);
    if (!lr.ok) throw new Error('weather_latest.json not found — run fetch_weather.py first');
    S.latest  = await lr.json();
    S.history = hr.ok ? await hr.json() : [];
    setTimestamp();
    buildLocRow();
    render();
  } catch(e) {
    document.getElementById('main').innerHTML = `<div class="err">⚠ ${e.message}</div>`;
  }
}

function setTimestamp() {
  if (!S.latest) return;
  const el  = document.getElementById('fetchedAt');
  const dot = document.getElementById('pulseDot');
  const pill = document.getElementById('statusPill');
  const age = Math.round((Date.now() - new Date(S.latest.fetched_at).getTime()) / 60000);
  el.textContent = S.latest.fetched_mel || `${age}m ago`;
  if (age > 90) { dot.classList.add('stale'); pill.title = 'Data may be stale'; }
  else dot.classList.remove('stale');
}

// ═══════════════════════════════════════════
// LOC ROW — always visible, 4 suburb cards
// ═══════════════════════════════════════════
function buildLocRow() {
  const wrap = document.getElementById('locRow');
  wrap.innerHTML = '';
  S.latest.locations.forEach((ld, i) => {
    const cur = ld.current;
    const ww  = WMO(cur.weather_code, cur.is_day);
    const div = document.createElement('div');
    div.className = 'loc-card' + (S.loc === i ? ' active' : '');
    div.innerHTML = `
      <div class="loc-id">${LOCS[i].short}</div>
      <div class="loc-temp-row">
        <div class="loc-temp">${Math.round(cur.temperature_2m)}°</div>
        <div class="loc-icon">${ww.i}</div>
      </div>
      <div class="loc-cond">${ww.t}</div>`;
    div.onclick = () => { S.loc = i; S.day = 0; updateLocRow(); buildDayNav(); render(); };
    wrap.appendChild(div);
  });
}

function updateLocRow() {
  document.querySelectorAll('.loc-card').forEach((c,i) => c.classList.toggle('active', i === S.loc));
}

// ═══════════════════════════════════════════
// DAY NAV
// ═══════════════════════════════════════════
function buildDayNav() {
  if (S.view === 'history') { document.getElementById('dayNav').innerHTML = ''; return; }
  const ld    = S.latest.locations[S.loc];
  const daily = ld.daily;
  const wrap  = document.getElementById('dayNav');
  wrap.innerHTML = '';
  (daily.time || []).forEach((dt, i) => {
    const ww = WMO(daily.weather_code[i], 1);
    const mx = Math.round(daily.temperature_2m_max[i]);
    const mn = Math.round(daily.temperature_2m_min[i]);
    const btn = document.createElement('div');
    btn.className = 'day-btn' + (S.day === i ? ' active' : '');
    btn.innerHTML = `
      <div class="day-btn-name">${dayLabel(dt, i)}</div>
      <div class="day-btn-date">${shortDate(dt)}</div>
      <div class="day-btn-icon">${ww.i}</div>
      <div class="day-btn-range">${mx}° / ${mn}°</div>`;
    btn.onclick = () => {
      S.day = i;
      document.querySelectorAll('.day-btn').forEach((b,j) => b.classList.toggle('active', j===i));
      renderForecast();
    };
    wrap.appendChild(btn);
  });
}

// ═══════════════════════════════════════════
// VIEW SWITCH
// ═══════════════════════════════════════════
function switchView(v, el) {
  S.view = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  buildDayNav();
  render();
}

function render() {
  if (S.view === 'forecast') renderForecast();
  else renderHistory();
}

// ═══════════════════════════════════════════
// FORECAST
// ═══════════════════════════════════════════
function renderForecast() {
  const ld     = S.latest.locations[S.loc];
  const cur    = ld.current;
  const daily  = ld.daily;
  const hourly = ld.hourly;
  const meta   = LOCS[S.loc];
  const di     = S.day;
  const today  = di === 0;

  const ww      = WMO(today ? cur.weather_code : daily.weather_code[di], today ? cur.is_day : 1);
  const temp    = today ? Math.round(cur.temperature_2m)         : Math.round(daily.temperature_2m_max[di]);
  const feels   = today ? Math.round(cur.apparent_temperature)   : Math.round(daily.apparent_temperature_max[di]);
  const hi      = Math.round(daily.temperature_2m_max[di]);
  const lo      = Math.round(daily.temperature_2m_min[di]);
  const uv      = daily.uv_index_max[di] || 0;
  const uvi     = uvInfo(uv);
  const rp      = daily.precipitation_probability_max[di] || 0;
  const precip  = daily.precipitation_sum[di] || 0;
  const windMax = Math.round(daily.wind_speed_10m_max[di] || 0);
  const gustMax = Math.round(daily.wind_gusts_10m_max[di] || 0);
  const sunH    = daily.sunshine_duration ? Math.round(daily.sunshine_duration[di] / 3600) : '—';
  const sunrise = fmtTime(daily.sunrise[di]);
  const sunset  = fmtTime(daily.sunset[di]);
  const dayHrs  = getDayHours(hourly.time, di);
  const nowH    = getMelNowHour();

  let h = `<div class="fade">`;

  // OPS ALERT
  h += buildAlert(cur, daily, di);

  // HERO
  h += `
  <div class="hero-strip">
    <div class="hero-main">
      <div class="hero-suburb">${meta.suburb}</div>
      <div class="hero-sub">${meta.outlets} outlet${meta.outlets>1?'s':''} · ${today?'Live':'Forecast'}</div>
      <div class="hero-temp-row">
        <div class="hero-temp">${temp}<sup>°</sup></div>
      </div>
    </div>
    <div class="hero-right-panel">
      <div class="hero-icon-big">${ww.i}</div>
      <div>
        <div class="hero-cond">${ww.t}</div>
        <div class="hero-feels">Feels ${feels}°</div>
        <div class="hero-range">${lo}° — ${hi}°</div>
      </div>
    </div>
  </div>`;

  // STAT GRID
  h += `
  <div class="stat-grid">
    <div class="stat-cell">
      <div class="stat-lbl">UV Index</div>
      <div class="stat-val"><span class="uv-badge" style="background:${uvi.bg};color:${uvi.c}">${Math.round(uv)} ${uvi.t}</span></div>
    </div>
    <div class="stat-cell">
      <div class="stat-lbl">Rain Chance</div>
      <div class="stat-val" style="color:${rp<25?'var(--gn)':rp<60?'var(--amber)':'var(--blue)'}">${rp}<span class="stat-unit">%</span></div>
      <div class="stat-sub">${precip.toFixed(1)} mm</div>
    </div>
    <div class="stat-cell">
      <div class="stat-lbl">Wind Max</div>
      <div class="stat-val">${windMax}<span class="stat-unit"> km/h</span></div>
      <div class="stat-sub">Gusts ${gustMax} km/h</div>
    </div>
    <div class="stat-cell">
      <div class="stat-lbl">Sunshine</div>
      <div class="stat-val">${sunH}<span class="stat-unit"> hr</span></div>
      <div class="stat-sub">${sunrise} — ${sunset}</div>
    </div>
    <div class="stat-cell">
      <div class="stat-lbl">${today?'Humidity':'Precip Hrs'}</div>
      <div class="stat-val">${today?(cur.relative_humidity_2m||'—'):(daily.precipitation_hours?daily.precipitation_hours[di].toFixed(0):'—')}<span class="stat-unit">${today?'%':' hr'}</span></div>
      <div class="stat-sub">${today?(cur.surface_pressure?Math.round(cur.surface_pressure)+' hPa':'—'):'Wet hours est.'}</div>
    </div>
    <div class="stat-cell">
      <div class="stat-lbl">${today?'Visibility':'Low Temp'}</div>
      <div class="stat-val">${today?(cur.visibility?Math.round(cur.visibility/1000):'—'):(lo+'')}<span class="stat-unit">${today?' km':'°'}</span></div>
      <div class="stat-sub">${today?'Current':'Overnight low'}</div>
    </div>
  </div>`;

  // HOURLY
  h += `<div class="panel">
    <div class="panel-hd"><div class="panel-title">Hourly Breakdown</div><div class="panel-sub">${today?'From 5 am':'Full day'}</div></div>
    <div class="h-scroll">`;
  dayHrs.forEach(i => {
    const hNum  = parseInt(hourly.time[i].substring(11,13), 10);
    const isNow = today && hNum === nowH;
    const ww2   = WMO(hourly.weather_code[i], hNum>=6&&hNum<20);
    const t     = Math.round(hourly.temperature_2m[i]);
    const rp2   = hourly.precipitation_probability[i] || 0;
    const rc    = rp2<20?'dry':rp2<50?'maybe':'wet';
    const g     = Math.round(hourly.wind_gusts_10m[i]||0);
    h += `<div class="hb${isNow?' now':''}">
      <div class="hb-t">${isNow?'NOW':fmtHour(hourly.time[i])}</div>
      <div class="hb-i">${ww2.i}</div>
      <div class="hb-d">${t}°</div>
      <div class="hb-r ${rc}">${rp2}%</div>
      <div class="hb-g">↑${g}</div>
    </div>`;
  });
  h += `</div></div>`;

  // RAIN BARS
  h += `<div class="panel">
    <div class="panel-hd"><div class="panel-title">Rain Probability</div><div class="panel-sub">Hour by hour</div></div>
    <div class="rain-rows">`;
  dayHrs.forEach(i => {
    const hNum  = parseInt(hourly.time[i].substring(11,13), 10);
    const isNow = today && hNum === nowH;
    const p     = hourly.precipitation_probability[i] || 0;
    const col   = p<25?'var(--gn)':p<55?'var(--amber)':'var(--blue)';
    h += `<div class="rr">
      <div class="rr-t">${isNow?'NOW':fmtHour(hourly.time[i])}</div>
      <div class="rr-wrap"><div class="rr-bar" style="width:${p}%;background:${col}"></div></div>
      <div class="rr-pct" style="color:${col}">${p}%</div>
    </div>`;
  });
  h += `</div></div>`;

  // WIND (today only)
  if (today && cur.wind_direction_10m != null) {
    const wDir = cur.wind_direction_10m;
    const wSpd = Math.round(cur.wind_speed_10m || 0);
    const wGst = Math.round(cur.wind_gusts_10m || 0);
    h += `<div class="panel">
      <div class="panel-hd"><div class="panel-title">Wind</div><div class="panel-sub">Current</div></div>
      <div class="wind-grid">
        <div class="compass-wrap">
          ${compassSVG(wDir)}
          <div class="compass-lbl">${bearingLabel(wDir)}</div>
        </div>
        <div class="wind-stats">
          <div class="ws-row"><span class="ws-lbl">Speed</span><span class="ws-val">${wSpd}<span class="ws-unit"> km/h</span></span></div>
          <div class="ws-row"><span class="ws-lbl">Gusts</span><span class="ws-val">${wGst}<span class="ws-unit"> km/h</span></span></div>
          <div class="ws-row"><span class="ws-lbl">Direction</span><span class="ws-val" style="font-size:15px">${wDir}° ${bearingLabel(wDir)}</span></div>
          <div class="ws-row"><span class="ws-lbl">Max Today</span><span class="ws-val">${windMax}<span class="ws-unit"> km/h</span></span></div>
        </div>
      </div>
    </div>`;
  }

  // 7-DAY
  h += `<div class="panel">
    <div class="panel-hd"><div class="panel-title">7-Day Outlook</div><div class="panel-sub">BOM ACCESS via Open-Meteo</div></div>
    <div class="fc-grid">`;
  (daily.time || []).forEach((dt, i2) => {
    const ww3 = WMO(daily.weather_code[i2], 1);
    const mx  = Math.round(daily.temperature_2m_max[i2]);
    const mn  = Math.round(daily.temperature_2m_min[i2]);
    const rp3 = daily.precipitation_probability_max[i2] || 0;
    const pm  = (daily.precipitation_sum[i2]||0).toFixed(1);
    const sr  = fmtTime(daily.sunrise[i2]);
    const ss  = fmtTime(daily.sunset[i2]);
    h += `<div class="fc-day${i2===di?' active':''}" onclick="S.day=${i2};document.querySelectorAll('.day-btn').forEach((b,j)=>b.classList.toggle('active',j===${i2}));document.querySelectorAll('.fc-day').forEach((d,j)=>d.classList.toggle('active',j===${i2}));renderForecast()">
      <div class="fc-name">${dayLabel(dt,i2)}</div>
      <div class="fc-icon">${ww3.i}</div>
      <div class="fc-hi">${mx}°</div>
      <div class="fc-lo">${mn}°</div>
      <div class="fc-rp" style="color:${rp3<25?'var(--gn)':rp3<60?'var(--amber)':'var(--blue)'}">${rp3}%</div>
      <div class="fc-mm">${pm}mm</div>
      <div class="fc-sr">↑${sr}<br>↓${ss}</div>
    </div>`;
  });
  h += `</div></div>`;

  h += `</div>`;
  document.getElementById('main').innerHTML = h;

  // scroll hourly to NOW
  const nowEl = document.querySelector('.hb.now');
  if (nowEl) nowEl.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
}

// ═══════════════════════════════════════════
// OPS ALERT
// ═══════════════════════════════════════════
function buildAlert(cur, daily, di) {
  const today  = di === 0;
  const rp     = daily.precipitation_probability_max?.[di] || 0;
  const temp   = today ? cur.temperature_2m : daily.temperature_2m_max?.[di] || 0;
  const uv     = daily.uv_index_max?.[di] || 0;
  const gust   = today ? (cur.wind_gusts_10m||0) : (daily.wind_gusts_10m_max?.[di]||0);
  const precip = daily.precipitation_sum?.[di] || 0;
  let msgs=[], cls='clear', icon='✓';

  if (rp >= 70 || precip > 10) { msgs.push(`Heavy rain likely (${rp}%, ${precip.toFixed(1)}mm) — expect reduced foot traffic. Secure outdoor areas.`); cls='warn'; icon='⚠'; }
  else if (rp >= 40) { msgs.push(`Rain possible (${rp}%) — check outdoor furniture and have umbrellas ready.`); cls='mild'; icon='~'; }
  if (temp >= 35) { msgs.push(`Extreme heat (${Math.round(temp)}°C) — monitor fridges, increase cold drink stock, check staff welfare.`); cls='warn'; icon='!'; }
  else if (temp >= 28) { msgs.push(`Hot day (${Math.round(temp)}°C) — boost cold drinks and iced coffee prep.`); if(cls==='clear'){cls='mild';icon='↑';} }
  else if (temp < 12) { msgs.push(`Cool day (${Math.round(temp)}°C) — strong hot coffee demand expected. Check soup stock.`); if(cls==='clear'){cls='mild';icon='↓';} }
  if (uv >= 8) { msgs.push(`Very high UV (${Math.round(uv)}) — remind outdoor staff about sun protection.`); if(cls==='clear'){cls='mild';icon='☀';} }
  if (gust >= 50) { msgs.push(`Strong gusts (${Math.round(gust)} km/h) — secure outdoor furniture, A-frames and signage.`); cls='warn'; icon='⚠'; }
  if (!msgs.length) msgs.push(`All clear — no weather impacts forecast for ${today?'today':dayLabel(daily.time?.[di]||'',di)}.`);

  return `<div class="ops-alert ${cls}">
    <div class="ops-alert-icon">${icon}</div>
    <div><div class="ops-alert-label">Ops Note</div>${msgs.join(' ')}</div>
  </div>`;
}

// ═══════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════
function renderHistory() {
  document.getElementById('dayNav').innerHTML = '';
  if (!S.history || S.history.length === 0) {
    document.getElementById('main').innerHTML = `<div class="no-data">No historical data yet — accumulates after a few fetch runs.</div>`;
    return;
  }
  const locId   = LOCS[S.loc].id;
  const locName = LOCS[S.loc].suburb;
  const cutoff  = new Date(Date.now() - S.histDays * 86400000).toISOString();
  const records = S.history
    .filter(r => r.location_id === locId && r.fetched_at >= cutoff)
    .sort((a,b) => a.fetched_at.localeCompare(b.fetched_at));

  const METRICS = {
    temp:      { key:'temp',            label:'Temperature (°C)', col:'var(--red)',   unit:'°C' },
    feels:     { key:'feels_like',      label:'Feels Like (°C)',  col:'var(--amber)', unit:'°C' },
    humidity:  { key:'humidity',        label:'Humidity (%)',     col:'var(--blue)',  unit:'%'  },
    rain_prob: { key:'day_precip_prob', label:'Rain Prob (%)',    col:'var(--blue)',  unit:'%'  },
    precip:    { key:'day_precip_mm',   label:'Rainfall (mm)',    col:'var(--blue)',  unit:'mm' },
    wind:      { key:'wind_speed',      label:'Wind (km/h)',      col:'#9B59B6',      unit:'km/h'},
    gusts:     { key:'wind_gusts',      label:'Gusts (km/h)',     col:'var(--red)',   unit:'km/h'},
    uv:        { key:'uv_index',        label:'UV Index',         col:'var(--amber)', unit:''   },
    pressure:  { key:'pressure',        label:'Pressure (hPa)',   col:'var(--gn)',    unit:'hPa'},
  };
  const cfg = METRICS[S.histMetric];

  // Day aggregation
  const byDay = {};
  records.forEach(r => {
    const day = r.fetched_at.substring(0,10);
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(r);
  });
  const days = Object.keys(byDay).sort();
  const vals = days.map(d => {
    const nums = byDay[d].map(r => r[cfg.key]).filter(v => v != null && !isNaN(v));
    return nums.length ? nums.reduce((a,b)=>a+b,0)/nums.length : null;
  });
  const valid = vals.filter(v=>v!=null);
  const avg = valid.length ? valid.reduce((a,b)=>a+b,0)/valid.length : null;
  const max = valid.length ? Math.max(...valid) : null;
  const min = valid.length ? Math.min(...valid) : null;

  // Counts
  const rainyDays = days.filter(d => byDay[d].some(r=>(r.day_precip_mm||0)>0.5)).length;
  const hotDays   = days.filter(d => byDay[d].some(r=>(r.day_max||0)>=30)).length;
  const coldDays  = days.filter(d => byDay[d].every(r=>(r.day_max||99)<15)).length;

  let h = `<div class="fade">`;

  // Controls
  h += `<div class="hist-controls">
    <span class="hist-lbl">Location:</span>
    <select class="hist-sel" onchange="S.loc=+this.value;updateLocRow();renderHistory()">
      ${LOCS.map((m,i)=>`<option value="${i}"${S.loc===i?' selected':''}>${m.suburb}</option>`).join('')}
    </select>
    <span class="hist-lbl">Period:</span>
    <select class="hist-sel" onchange="S.histDays=+this.value;renderHistory()">
      ${[7,14,30,90,365].map(d=>`<option value="${d}"${S.histDays===d?' selected':''}>${d===365?'12 months':'Last '+d+'d'}</option>`).join('')}
    </select>
    <span class="hist-lbl">Metric:</span>
    <select class="hist-sel" onchange="S.histMetric=this.value;renderHistory()">
      ${Object.entries(METRICS).map(([k,v])=>`<option value="${k}"${S.histMetric===k?' selected':''}>${v.label}</option>`).join('')}
    </select>
  </div>`;

  // Summary stats
  h += `<div class="hist-stats">
    ${[['Average', avg, cfg.unit],['Maximum', max, cfg.unit],['Minimum', min, cfg.unit],['Days', days.length, '']].map(([l,v,u])=>`
    <div class="hist-stat">
      <div class="stat-lbl">${l}</div>
      <div class="stat-val">${v!=null?(Number.isInteger(v)?v:v.toFixed(1)):'—'}<span class="stat-unit"> ${u}</span></div>
    </div>`).join('')}
  </div>`;

  // Line chart
  h += `<div class="panel">
    <div class="panel-hd"><div class="panel-title">${cfg.label} — ${locName}</div><div class="panel-sub">${records.length} readings · ${days.length} days</div></div>
    ${buildLineChart(days, vals, cfg)}
  </div>`;

  // Summary counts
  h += `<div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
    <div class="stat-cell"><div class="stat-lbl">Rainy Days</div><div class="stat-val" style="color:var(--blue)">${rainyDays}</div><div class="stat-sub">> 0.5mm</div></div>
    <div class="stat-cell"><div class="stat-lbl">Hot Days</div><div class="stat-val" style="color:var(--red)">${hotDays}</div><div class="stat-sub">max ≥ 30°C</div></div>
    <div class="stat-cell" style="border-right:none"><div class="stat-lbl">Cold Days</div><div class="stat-val" style="color:var(--blue)">${coldDays}</div><div class="stat-sub">max < 15°C</div></div>
  </div>`;

  // Daily temp range cards (last 14 days)
  if (S.histMetric === 'temp') {
    h += `<div class="panel">
      <div class="panel-hd"><div class="panel-title">Daily Range</div><div class="panel-sub">Last 14 days</div></div>
      <div class="range-strip">`;
    days.slice(-14).forEach(d => {
      const temps = byDay[d].map(r=>r.temp).filter(v=>v!=null);
      if (!temps.length) return;
      const dmx = Math.round(Math.max(...temps));
      const dmn = Math.round(Math.min(...temps));
      const dt  = new Date(d+'T00:00:00');
      h += `<div class="range-card">
        <div class="rc-day">${dt.toLocaleDateString('en-AU',{weekday:'short'})}<br>${dt.getDate()}/${dt.getMonth()+1}</div>
        <div class="rc-hi">${dmx}°</div>
        <div class="rc-lo">${dmn}°</div>
      </div>`;
    });
    h += `</div></div>`;
  }

  h += `</div>`;
  document.getElementById('main').innerHTML = h;
}

// ═══════════════════════════════════════════
// SVG LINE CHART
// ═══════════════════════════════════════════
function buildLineChart(labels, vals, cfg) {
  const W=880, H=180, pL=40, pR=12, pT=12, pB=28;
  const cW=W-pL-pR, cH=H-pT-pB;
  const valid = vals.filter(v=>v!=null);
  if (!valid.length) return `<div class="no-data">No data to chart.</div>`;
  const dMin=Math.min(...valid), dMax=Math.max(...valid);
  const range=dMax-dMin||1, pad=range*.1;
  const yMin=dMin-pad, yMax=dMax+pad;
  const xS = i => pL + (i/(vals.length-1||1))*cW;
  const yS = v => pT + cH - ((v-yMin)/(yMax-yMin))*cH;

  let grid='', yLbls='';
  for (let t=0; t<=4; t++) {
    const v=yMin+(t/4)*(yMax-yMin), y=yS(v);
    grid  += `<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
    yLbls += `<text x="${pL-4}" y="${y+4}" text-anchor="end" font-family="Barlow Condensed,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">${Math.round(v)}</text>`;
  }

  const every = vals.length>60?14:vals.length>20?7:vals.length>10?3:1;
  let xLbls='';
  labels.forEach((d,i) => {
    if (i%every!==0) return;
    const dt=new Date(d+'T00:00:00');
    xLbls += `<text x="${xS(i)}" y="${H-6}" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">${dt.getDate()}/${dt.getMonth()+1}</text>`;
  });

  let pts=[], aPts=[];
  vals.forEach((v,i)=>{ if(v==null)return; pts.push(`${i===0?'M':'L'}${xS(i).toFixed(1)},${yS(v).toFixed(1)}`); aPts.push({x:xS(i),y:yS(v)}); });

  let area='';
  if (aPts.length>1) {
    area = `M${aPts[0].x.toFixed(1)},${aPts[0].y.toFixed(1)} `
      + aPts.slice(1).map(p=>`L${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')
      + ` L${aPts[aPts.length-1].x.toFixed(1)},${(pT+cH).toFixed(1)} L${aPts[0].x.toFixed(1)},${(pT+cH).toFixed(1)} Z`;
  }

  return `<div class="chart-wrap">
  <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;min-width:420px;height:auto">
    <defs>
      <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${cfg.col}" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="${cfg.col}" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    ${grid}${yLbls}${xLbls}
    ${area?`<path d="${area}" fill="url(#cg)"/>`:''}
    <path d="${pts.join(' ')}" fill="none" stroke="${cfg.col}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </svg></div>`;
}

// ═══════════════════════════════════════════
// COMPASS SVG
// ═══════════════════════════════════════════
function compassSVG(deg) {
  const cx=36,cy=36,r=28;
  const rad=(deg-90)*Math.PI/180;
  const ax=cx+r*.55*Math.cos(rad), ay=cy+r*.55*Math.sin(rad);
  const tx=cx-r*.35*Math.cos(rad), ty=cy-r*.35*Math.sin(rad);
  return `<svg viewBox="0 0 72 72" width="64" height="64" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="${cx}" y="10" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" font-weight="700">N</text>
    <text x="${cx}" y="68" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" font-weight="700">S</text>
    <text x="6"     y="${cy+3}" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" font-weight="700">W</text>
    <text x="66"    y="${cy+3}" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" font-weight="700">E</text>
    <line x1="${tx}" y1="${ty}" x2="${ax}" y2="${ay}" stroke="var(--red)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="${ax}" cy="${ay}" r="3" fill="var(--red)"/>
    <circle cx="${cx}" cy="${cy}" r="2.5" fill="rgba(255,255,255,0.6)"/>
  </svg>`;
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function WMO(c, day=1) {
  const m={
    0:{i:day?'☀️':'🌙',t:'Clear'},1:{i:day?'🌤':'🌙',t:'Mostly clear'},
    2:{i:'⛅',t:'Partly cloudy'},3:{i:'☁️',t:'Overcast'},
    45:{i:'🌫',t:'Fog'},48:{i:'🌫',t:'Rime fog'},
    51:{i:'🌦',t:'Light drizzle'},53:{i:'🌦',t:'Drizzle'},55:{i:'🌧',t:'Heavy drizzle'},
    61:{i:'🌧',t:'Light rain'},63:{i:'🌧',t:'Rain'},65:{i:'🌧',t:'Heavy rain'},
    71:{i:'❄️',t:'Light snow'},73:{i:'❄️',t:'Snow'},75:{i:'❄️',t:'Heavy snow'},
    80:{i:'🌦',t:'Showers'},81:{i:'🌧',t:'Showers'},82:{i:'⛈',t:'Heavy showers'},
    95:{i:'⛈',t:'Storm'},96:{i:'⛈',t:'Storm+hail'},99:{i:'⛈',t:'Storm+hail'},
  };
  return m[c]||{i:'🌡',t:'Unknown'};
}

function uvInfo(v) {
  if(v<=2)  return{t:'Low',      c:'var(--gn)',    bg:'rgba(29,185,84,0.2)'};
  if(v<=5)  return{t:'Moderate', c:'var(--amber)', bg:'rgba(245,166,35,0.2)'};
  if(v<=7)  return{t:'High',     c:'#E07820',      bg:'rgba(224,120,32,0.2)'};
  if(v<=10) return{t:'Very High',c:'var(--red)',   bg:'rgba(215,15,0,0.2)'};
  return           {t:'Extreme', c:'#C060E0',      bg:'rgba(192,96,224,0.2)'};
}

function getMelNowHour() {
  const s = new Date().toLocaleString('en-AU',{timeZone:'Australia/Melbourne',hour:'2-digit',hour12:false});
  return parseInt(s.replace(/\D/g,'').substring(0,2),10);
}

function getDayHours(times, di) {
  const base = new Date(new Date().toLocaleString('en-US',{timeZone:'Australia/Melbourne'}));
  const tgt  = new Date(base); tgt.setDate(tgt.getDate()+di);
  const ds   = `${tgt.getFullYear()}-${String(tgt.getMonth()+1).padStart(2,'0')}-${String(tgt.getDate()).padStart(2,'0')}`;
  return times.reduce((acc,t,i)=>{
    if(t.startsWith(ds)&&parseInt(t.substring(11,13),10)>=5) acc.push(i);
    return acc;
  },[]);
}

function fmtHour(iso) {
  const h=parseInt(iso.substring(11,13),10);
  if(h===0)return'12am'; if(h===12)return'12pm';
  return h<12?`${h}am`:`${h-12}pm`;
}

function fmtTime(iso) {
  if(!iso)return'—';
  const p=iso.split('T'); if(!p[1])return'—';
  const [h,m]=p[1].split(':').map(Number);
  return`${h===0?12:h>12?h-12:h}:${String(m).padStart(2,'0')}${h<12?'am':'pm'}`;
}

function shortDate(iso) {
  const d=new Date(iso+'T00:00:00');
  return`${d.getDate()} ${d.toLocaleDateString('en-AU',{month:'short'})}`;
}

function dayLabel(iso,i) {
  if(i===0)return'Today'; if(i===1)return'Tmrw';
  return new Date(iso+'T00:00:00').toLocaleDateString('en-AU',{weekday:'short'});
}

function bearingLabel(deg) {
  return['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(deg/22.5)%16];
}
